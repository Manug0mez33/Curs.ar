{% extends 'base.html' %}

{% block title %}Eliminar Módulo{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-danger">
                <div class="card-body">
                    <h2 class="card-title mb-4 text-danger">
                        <i class="fas fa-exclamation-triangle"></i> Confirmar Eliminación
                    </h2>

                    <p class="mb-4">¿Estás seguro de que quieres eliminar el módulo?</p>
                    
                    <div class="alert alert-warning">
                        <strong>{{ modulo.titulo }}</strong>
                        <p class="mb-0">También se eliminarán todas sus clases.</p>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-danger">Sí, Eliminar</button>
                            <a href="{% url 'listar_modulos' curso.id %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
